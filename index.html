  <script>
    // =========================================================================
    // CONFIGURAÇÃO E ESTADO GLOBAL
    // =========================================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbw7lWPgkkVfkX7c44nNI31nNxDE4wGGc_SuXxNF83whucuWTYYlRDVu27b7l5MdpaRZ/exec';

    const DEFAULT_CATEGORIES = ['Nota de Falecimento', 'Igreja', 'Evento', 'Política', 'Comercial', 'Pessoal'];
    const MOCK_PROJECTS = [
      { id: '1', title: 'Campanha Minimalista', category: 'Comercial', type: 'arte', isFeatured: true, imageUrl: 'https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&q=80&w=1000', description: 'Uma campanha focada no minimalismo e na clareza da mensagem.', createdAt: Date.now() },
      { id: '2', title: 'Lançamento de Produto', category: 'Evento', type: 'video', isFeatured: true, imageUrl: 'https://images.unsplash.com/photo-1536240478700-b869070f9279?auto=format&fit=crop&q=80&w=1000', videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ', description: 'Vídeo cinematográfico criado para o lançamento de um produto inovador.', createdAt: Date.now() - 1000 },
      { id: '3', title: 'Identidade Visual', category: 'Política', type: 'arte', isFeatured: false, imageUrl: 'https://images.unsplash.com/photo-1626785774573-4b799315345d?auto=format&fit=crop&q=80&w=1000', description: 'Redesign de identidade visual focada em trazer mais seriedade.', createdAt: Date.now() - 2000 },
      { id: '4', title: 'Ensaio Urbano', category: 'Pessoal', type: 'foto', isFeatured: true, imageUrl: 'https://images.unsplash.com/photo-1511406361295-0a1ff814c0ce?auto=format&fit=crop&q=80&w=1000', description: 'Série de fotografias que capturam a essência do movimento na cidade grande.', createdAt: Date.now() - 3000 },
    ];

    let state = {
      view: 'home',
      isAdmin: false,
      adminTab: 'dashboard',
      editingProject: null,
      projects: [],
      categories: [],
      designerFilter: 'Todos',
      settings: {
        heroName: 'LUCAS ROCHA',
        heroSubtitle: 'Creative Designer & Visual Architect',
        heroPhrase: 'Transformando ideias complexas em experiências visuais imersivas e inesquecíveis.',
        heroImage: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=2000',
        aboutText: 'Sou um designer apaixonado por criar interfaces e identidades visuais que não apenas parecem bonitas, mas funcionam com perfeição. Com foco no minimalismo e na usabilidade, busco sempre a interseção entre a arte e a tecnologia.',
        email: 'hello@lucasrocha.com',
        instagram: '#',
        whatsapp: '#',
        linkedin: '#',
        contactTitle: 'Vamos conversar.',
        contactSubtitle: 'Tem um projeto em mente? Deixe sua mensagem.'
      }
    };

    document.getElementById('current-year').textContent = new Date().getFullYear();

    // =========================================================================
    // UTILITÁRIOS E API
    // =========================================================================
    const formatDriveUrl = (url) => {
      if (!url) return '';
      const match = url.match(/(?:id=|v=|d\/|id\/)([a-zA-Z0-9_-]{25,})/);
      if (match && match[1] && url.includes('google')) {
        return `https://lh3.googleusercontent.com/d/${match[1]}`;
      }
      return url;
    };

    const getEmbedUrl = (url) => {
      if (!url) return '';
      const driveMatch = url.match(/(?:id=|v=|d\/|id\/)([a-zA-Z0-9_-]{25,})/);
      if (driveMatch && driveMatch[1] && url.includes('google')) {
        return `https://drive.google.com/file/d/${driveMatch[1]}/preview?autoplay=1`;
      }
      return url + (url.includes('?') ? '&autoplay=1' : '?autoplay=1');
    };

    const getVideoCover = (url) => {
      if (!url) return '';
      const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
      if (ytMatch && ytMatch[1]) {
        return `https://img.youtube.com/vi/${ytMatch[1]}/maxresdefault.jpg`;
      }
      return formatDriveUrl(url); 
    };

    const fetchData = async () => {
      let progress = 0;
      const progressEl = document.getElementById('loader-percentage');
      
      const interval = setInterval(() => {
        progress += Math.floor(Math.random() * 15) + 5;
        if (progress > 95) progress = 95;
        if (progressEl) progressEl.textContent = progress + '%';
      }, 150);

      try {
        const res = await fetch(`${API_URL}?action=getAll`);
        const json = await res.json();
        
        if (json.status === 'success') {
          if (json.data.projects?.length > 0) {
            state.projects = json.data.projects.map(p => ({
              ...p,
              imageUrl: formatDriveUrl(p.imageUrl)
            })).sort((a,b) => b.createdAt - a.createdAt);
          } else {
            state.projects = MOCK_PROJECTS;
          }
          
          if (json.data.categories?.length > 0) {
            state.categories = json.data.categories.map(c => c.name);
          } else {
            state.categories = DEFAULT_CATEGORIES;
          }
          
          if (json.data.settings?.heroName) {
            state.settings = {
              ...state.settings,
              ...json.data.settings,
              heroImage: formatDriveUrl(json.data.settings.heroImage)
            };
            if (!json.data.settings.whatsapp && json.data.settings.twitter) {
                state.settings.whatsapp = json.data.settings.twitter;
            }
          }
        }
      } catch (err) {
        console.error("Erro ao buscar dados do Google Sheets:", err);
        state.projects = MOCK_PROJECTS;
        state.categories = DEFAULT_CATEGORIES;
      } finally {
        clearInterval(interval);
        if (progressEl) progressEl.textContent = '100%';
        
        setTimeout(() => {
          const loader = document.getElementById('loader');
          loader.classList.add('opacity-0');
          setTimeout(() => loader.classList.add('hidden'), 500);
          updateUI();
          triggerAnimations();
        }, 600);
      }
    };

    const apiPost = async (action, payload) => {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify({ action, payload })
        });
        return await res.json();
      } catch (err) {
        console.error("Erro ao comunicar com API:", err);
        if (err.message === 'Failed to fetch') {
          alert("Erro de conexão com o banco de dados (CORS).\n\n1. Verifique se publicou o Apps Script como 'Nova Versão'.\n2. Garanta que a permissão está definida para 'Qualquer pessoa'.");
        }
        throw err;
      }
    };

    // =========================================================================
    // NAVEGAÇÃO E UI
    // =========================================================================
    function navigate(newView) {
      state.view = newView;
      closeMobileMenu();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      updateUI();
