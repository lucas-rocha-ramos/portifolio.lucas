<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUCAS ROCHA - Portfolio</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Ocultar barra de scroll mas manter funcionalidade para carrosséis específicos */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Barra de rolagem minimalista global para o site e modais */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }

    /* Animações CSS para substituir o Framer Motion */
    .fade-in-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .fade-in-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .loader-spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loader-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    ::selection {
      background-color: #fff;
      color: #000;
    }

    /* ============================================================ */
    /* APENAS ESTE BLOCO FOI ADICIONADO - AJUSTE DE VÍDEO EM MOBILE */
    /* ============================================================ */
    @media (max-width: 768px) {
      /* Força o modal a ficar em coluna e ajusta alturas */
      #project-modal-box {
        flex-direction: column !important;
      }
      
      /* Área do vídeo/mídia - MAIOR (70% da altura) */
      #project-modal-media {
        height: 70vh !important;
        width: 100% !important;
        min-height: 60vh !important;
      }
      
      /* Container interno da mídia */
      #project-modal-media > div {
        height: 100% !important;
        padding: 0.5rem !important;
      }
      
      /* Iframe e imagem ocupam todo espaço disponível */
      #project-modal-media iframe,
      #project-modal-media img {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain !important;
      }
      
      /* Área de detalhes - MENOR (30% da altura) */
      #project-modal-details {
        height: auto !important;
        max-height: 30vh !important;
        padding: 0.75rem 1rem !important;
        overflow-y: auto !important;
      }
      
      /* Título menor */
      #project-modal-title {
        font-size: 1.25rem !important;
        margin-bottom: 0.25rem !important;
      }
      
      /* Categoria menor */
      #project-modal-category {
        font-size: 0.65rem !important;
        margin-bottom: 0.25rem !important;
      }
      
      /* Descrição compacta (máximo 2 linhas) */
      #project-modal-description {
        font-size: 0.75rem !important;
        line-height: 1.3 !important;
        max-height: 2.6rem !important;
        overflow: hidden !important;
        display: -webkit-box !important;
        -webkit-line-clamp: 2 !important;
        -webkit-box-orient: vertical !important;
      }
      
      /* Sugestão "Veja também" compacta */
      #project-modal-suggestion {
        margin-top: 0.25rem !important;
        padding-top: 0.5rem !important;
      }
      
      #project-modal-suggestion h4 {
        font-size: 0.6rem !important;
        margin-bottom: 0.25rem !important;
      }
      
      #project-modal-suggestion-card {
        padding: 0.4rem !important;
      }
      
      #project-modal-suggestion-card .w-24 {
        width: 2.5rem !important;
        height: 2.5rem !important;
      }
      
      #project-modal-suggestion-card .pl-4 {
        padding-left: 0.5rem !important;
      }
      
      #project-modal-suggestion-card .text-sm {
        font-size: 0.65rem !important;
      }
      
      #project-modal-suggestion-card .text-\[10px\] {
        font-size: 0.55rem !important;
      }
      
      /* Botão de fechar um pouco menor */
      #project-modal > button.absolute {
        width: 2rem !important;
        height: 2rem !important;
        top: 0.5rem !important;
        right: 0.5rem !important;
      }
    }
  </style>
</head>

  <script>
    // =========================================================================
    // CONFIGURAÇÃO E ESTADO GLOBAL
    // =========================================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbw7lWPgkkVfkX7c44nNI31nNxDE4wGGc_SuXxNF83whucuWTYYlRDVu27b7l5MdpaRZ/exec';

    const DEFAULT_CATEGORIES = ['Nota de Falecimento', 'Igreja', 'Evento', 'Política', 'Comercial', 'Pessoal'];
    const MOCK_PROJECTS = [
      { id: '1', title: 'Campanha Minimalista', category: 'Comercial', type: 'arte', isFeatured: true, imageUrl: 'https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&q=80&w=1000', description: 'Uma campanha focada no minimalismo e na clareza da mensagem.', createdAt: Date.now() },
      { id: '2', title: 'Lançamento de Produto', category: 'Evento', type: 'video', isFeatured: true, imageUrl: 'https://images.unsplash.com/photo-1536240478700-b869070f9279?auto=format&fit=crop&q=80&w=1000', videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ', description: 'Vídeo cinematográfico criado para o lançamento de um produto inovador.', createdAt: Date.now() - 1000 },
      { id: '3', title: 'Identidade Visual', category: 'Política', type: 'arte', isFeatured: false, imageUrl: 'https://images.unsplash.com/photo-1626785774573-4b799315345d?auto=format&fit=crop&q=80&w=1000', description: 'Redesign de identidade visual focada em trazer mais seriedade.', createdAt: Date.now() - 2000 },
      { id: '4', title: 'Ensaio Urbano', category: 'Pessoal', type: 'foto', isFeatured: true, imageUrl: 'https://images.unsplash.com/photo-1511406361295-0a1ff814c0ce?auto=format&fit=crop&q=80&w=1000', description: 'Série de fotografias que capturam a essência do movimento na cidade grande.', createdAt: Date.now() - 3000 },
    ];

    let state = {
      view: 'home',
      isAdmin: false,
      adminTab: 'dashboard',
      editingProject: null,
      projects: [],
      categories: [],
      designerFilter: 'Todos',
      settings: {
        heroName: 'LUCAS ROCHA',
        heroSubtitle: 'Creative Designer & Visual Architect',
        heroPhrase: 'Transformando ideias complexas em experiências visuais imersivas e inesquecíveis.',
        heroImage: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=2000',
        aboutText: 'Sou um designer apaixonado por criar interfaces e identidades visuais que não apenas parecem bonitas, mas funcionam com perfeição. Com foco no minimalismo e na usabilidade, busco sempre a interseção entre a arte e a tecnologia.',
        email: 'hello@lucasrocha.com',
        instagram: '#',
        whatsapp: '#',
        linkedin: '#',
        contactTitle: 'Vamos conversar.',
        contactSubtitle: 'Tem um projeto em mente? Deixe sua mensagem.'
      }
    };

    document.getElementById('current-year').textContent = new Date().getFullYear();

    // =========================================================================
    // UTILITÁRIOS E API
    // =========================================================================
    const formatDriveUrl = (url) => {
      if (!url) return '';
      const match = url.match(/(?:id=|v=|d\/|id\/)([a-zA-Z0-9_-]{25,})/);
      if (match && match[1] && url.includes('google')) {
        return `https://lh3.googleusercontent.com/d/${match[1]}`;
      }
      return url;
    };

    const getEmbedUrl = (url) => {
      if (!url) return '';
      const driveMatch = url.match(/(?:id=|v=|d\/|id\/)([a-zA-Z0-9_-]{25,})/);
      if (driveMatch && driveMatch[1] && url.includes('google')) {
        return `https://drive.google.com/file/d/${driveMatch[1]}/preview?autoplay=1`;
      }
      return url + (url.includes('?') ? '&autoplay=1' : '?autoplay=1');
    };

    const getVideoCover = (url) => {
      if (!url) return '';
      const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
      if (ytMatch && ytMatch[1]) {
        return `https://img.youtube.com/vi/${ytMatch[1]}/maxresdefault.jpg`;
      }
      return formatDriveUrl(url); 
    };

    const fetchData = async () => {
      let progress = 0;
      const progressEl = document.getElementById('loader-percentage');
      
      const interval = setInterval(() => {
        progress += Math.floor(Math.random() * 15) + 5;
        if (progress > 95) progress = 95;
        if (progressEl) progressEl.textContent = progress + '%';
      }, 150);

      try {
        const res = await fetch(`${API_URL}?action=getAll`);
        const json = await res.json();
        
        if (json.status === 'success') {
          if (json.data.projects?.length > 0) {
            state.projects = json.data.projects.map(p => ({
              ...p,
              imageUrl: formatDriveUrl(p.imageUrl)
            })).sort((a,b) => b.createdAt - a.createdAt);
          } else {
            state.projects = MOCK_PROJECTS;
          }
          
          if (json.data.categories?.length > 0) {
            state.categories = json.data.categories.map(c => c.name);
          } else {
            state.categories = DEFAULT_CATEGORIES;
          }
          
          if (json.data.settings?.heroName) {
            state.settings = {
              ...state.settings, // Mantém defaults se faltar algo no banco
              ...json.data.settings,
              heroImage: formatDriveUrl(json.data.settings.heroImage)
            };
            
            // Fallback de compatibilidade caso só tenha a coluna twitter antiga no Sheets
            if (!json.data.settings.whatsapp && json.data.settings.twitter) {
                state.settings.whatsapp = json.data.settings.twitter;
            }
          }
        }
      } catch (err) {
        console.error("Erro ao buscar dados do Google Sheets:", err);
        state.projects = MOCK_PROJECTS;
        state.categories = DEFAULT_CATEGORIES;
      } finally {
        clearInterval(interval);
        if (progressEl) progressEl.textContent = '100%';
        
        setTimeout(() => {
          const loader = document.getElementById('loader');
          loader.classList.add('opacity-0');
          setTimeout(() => loader.classList.add('hidden'), 500);
          updateUI();
          triggerAnimations();
        }, 600);
      }
    };

    const apiPost = async (action, payload) => {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify({ action, payload })
        });
        return await res.json();
      } catch (err) {
        console.error("Erro ao comunicar com API:", err);
        if (err.message === 'Failed to fetch') {
          alert("Erro de conexão com o banco de dados (CORS).\n\n1. Verifique se publicou o Apps Script como 'Nova Versão'.\n2. Garanta que a permissão está definida para 'Qualquer pessoa'.");
        }
        throw err;
      }
    };

    // =========================================================================
    // NAVEGAÇÃO E UI
    // =========================================================================
    function navigate(newView) {
      state.view = newView;
      closeMobileMenu();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      updateUI();
      triggerAnimations();
    }

    function updateUI() {
      // Update Navbar Links Active State
      document.querySelectorAll('.nav-link').forEach(el => {
        if(el.dataset.target === state.view) {
          el.classList.add('text-white');
          el.classList.remove('text-gray-300');
        } else {
          el.classList.add('text-gray-300');
          el.classList.remove('text-white');
        }
      });

      // Update Header/Footer global info
      document.getElementById('nav-logo-text').textContent = state.settings.heroName.split(' ')[0];
      document.getElementById('footer-name').textContent = state.settings.heroName;
      document.getElementById('footer-subtitle').textContent = state.settings.heroSubtitle;
      document.getElementById('footer-ig').href = state.settings.instagram || '#';
      document.getElementById('footer-wa').href = state.settings.whatsapp || '#';
      document.getElementById('footer-li').href = state.settings.linkedin || '#';

      // Hide all views
      document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
      document.getElementById('view-admin').classList.add('hidden');
      document.getElementById('navbar').classList.remove('hidden');
      document.getElementById('footer').classList.remove('hidden');
      document.getElementById('main-content').classList.remove('hidden');

      // Show requested view
      if (state.view === 'home') renderHome();
      else if (state.view === 'designer') renderDesigner();
      else if (state.view === 'video') renderVideo();
      else if (state.view === 'fotografia') renderFotografia();
      else if (state.view === 'sobre') renderSobre();
      else if (state.view === 'contato') renderContato();
      else if (state.view === 'admin') {
        if (!state.isAdmin) {
          navigate('home');
          return;
        }
        document.getElementById('navbar').classList.add('hidden');
        document.getElementById('footer').classList.add('hidden');
        document.getElementById('main-content').classList.add('hidden');
        renderAdmin();
      }

      lucide.createIcons();
    }

    function triggerAnimations() {
      setTimeout(() => {
        document.querySelectorAll('.fade-in-up').forEach(el => el.classList.add('visible'));
      }, 50);
    }

    window.toggleProjectMediaInputs = function() {
      const type = document.getElementById('project-media-type').value;
      document.getElementById('media-inputs-arte').classList.add('hidden');
      document.getElementById('media-inputs-video').classList.add('hidden');

    const handleFileRead = (file) => new Promise((resolve, reject) => {
      const MAX_SIZE_MB = 35; 
      if (file.size > MAX_SIZE_MB * 1024 * 1024) {
        alert(`O ficheiro "${file.name}" tem ${(file.size / 1024 / 1024).toFixed(1)}MB. O limite para upload direto no painel é ${MAX_SIZE_MB}MB.\n\nPara ficheiros maiores, faça o upload diretamente na sua pasta do Google Drive e cole o link online no campo abaixo.`);
        reject(new Error('FILE_TOO_LARGE'));
        return;
      }
      const reader = new FileReader();
      reader.onload = () => resolve({
        name: file.name,
        mimeType: file.type,
        base64: reader.result.split(',')[1]
      });
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const generateVideoThumbnail = (file) => new Promise((resolve) => {
      const video = document.createElement('video');
      video.preload = 'metadata';
      video.muted = true;
      video.playsInline = true;
      video.src = URL.createObjectURL(file);
      video.onloadeddata = () => {
        video.currentTime = Math.min(1, video.duration > 0 ? video.duration / 2 : 1);
      };
      video.onseeked = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = (video.videoHeight / video.videoWidth) * 640;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
        URL.revokeObjectURL(video.src);
      };
      video.onerror = () => resolve('');
    });

    async function handleProjectSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-project-btn');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      const form = e.target;
      const mediaType = form.type.value;
      
      const baseData = {
        title: form.title.value || '',
        description: form.description.value || '',
        category: form.category.value,
        type: mediaType,
        isFeatured: form.isFeatured.checked || false,
        updatedAt: Date.now()
      };

      if (state.editingProject) {
        baseData.id = state.editingProject.id;
        baseData.createdAt = state.editingProject.createdAt;
      } else {
        baseData.createdAt = Date.now();
      }

      try {
        if (mediaType === 'foto') {
          const files = form.photoFiles.files;
          if (files && files.length > 0) {
            for (let i = 0; i < files.length; i++) {
              const fileUpload = await handleFileRead(files[i]);
              const data = { ...baseData, fileUpload };
              if (state.editingProject && i === 0) data.id = state.editingProject.id; 
              await apiPost('saveProject', data);
            }
          } else {
            const data = { ...baseData, imageUrl: formatDriveUrl(form.photoUrl.value) };
            await apiPost('saveProject', data);
          }
        } else if (mediaType === 'video') {
          const file = form.videoFile.files[0];
          let videoUrl = form.videoUrl.value || '';
          let imageUrl = '';
          let fileUpload = null;

          if (file) {
            fileUpload = await handleFileRead(file);
            imageUrl = await generateVideoThumbnail(file); 
          } else {
            imageUrl = getVideoCover(videoUrl);
          }

          const data = { ...baseData, videoUrl, imageUrl, fileUpload };
          await apiPost('saveProject', data);
        } else {
          const file = form.imageFile.files[0];
          let imageUrl = form.imageUrl.value || '';
          let fileUpload = null;

          if (file) {
            fileUpload = await handleFileRead(file);
          } else {
            imageUrl = formatDriveUrl(imageUrl);
          }

          const data = { ...baseData, imageUrl, fileUpload };
          await apiPost('saveProject', data);
        }

        await fetchData();
        setAdminTab('edit');
      } catch (err) {
        if (err.message === 'FILE_TOO_LARGE') {
           console.warn('Upload cancelado: o tamanho do ficheiro excede o limite permitido (35MB).');
        } else {
           console.error(err);
           alert('Ocorreu um erro ao comunicar e salvar as informações.');
        }
      } finally {
        btn.disabled = false;
        btn.textContent = state.editingProject ? 'Salvar Edição' : 'Salvar Projeto';
      }
    }

      e.preventDefault();
      const input = document.getElementById('new-cat-input');
      const btn = document.getElementById('add-cat-btn');
      const newCat = input.value;
      if(!newCat.trim()) return;

      btn.disabled = true;
      input.disabled = true;

      const catId = newCat.trim().toLowerCase().replace(/\s+/g, '-');
      try {
        await apiPost('saveCategory', { id: catId, name: newCat.trim() });
        await fetchData();
        setAdminTab('categories');
      } catch (err) {
        alert('Erro ao adicionar categoria.');
      } finally {
        btn.disabled = false;
        input.disabled = false;
      }
    }

    window.deleteCategory = async function(name) {
      if(!window.confirm('Excluir categoria?')) return;
      const catId = name.toLowerCase().replace(/\s+/g, '-');
      try {
        await apiPost('deleteCategory', { id: catId });
        await fetchData();
        setAdminTab('categories');
      } catch (err) {
        alert('Erro ao excluir do Google Sheets.');
      }
    }

    async function handleSettingsSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-settings-btn');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      const form = e.target;
      const data = {
        heroName: form.heroName.value,
        heroSubtitle: form.heroSubtitle.value,
        heroPhrase: form.heroPhrase.value,
        heroImage: formatDriveUrl(form.heroImage.value),
        aboutText: form.aboutText.value,
        email: form.email.value,
        instagram: form.instagram.value,
        whatsapp: form.whatsapp.value,
        linkedin: form.linkedin.value,
        contactTitle: form.contactTitle.value,
        contactSubtitle: form.contactSubtitle.value
      };

      try {
        await apiPost('saveSettings', data);
        await fetchData();
        alert('Configurações salvas com sucesso!');
        setAdminTab('settings');
      } catch (err) {
        console.error(err);
        alert('Erro ao salvar no Google Sheets.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar Configurações';
      }
    }

    // =========================================================================
    // MODALS E INTERACTIONS
    // =========================================================================
    function handleLockClick() {
      if (state.isAdmin) {
        navigate('admin');
      } else {
        openLoginModal();
      }
    }

    function openLoginModal() {
      const modal = document.getElementById('login-modal');
      const box = document.getElementById('login-modal-box');
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        box.classList.remove('scale-95');
        box.classList.add('scale-100');
      }, 10);
    }

    window.closeLoginModal = function() {
      const modal = document.getElementById('login-modal');
      const box = document.getElementById('login-modal-box');
      modal.classList.add('opacity-0');
      box.classList.remove('scale-100');
      box.classList.add('scale-95');
      setTimeout(() => modal.classList.add('hidden'), 300);
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      // You may want to add a real API call here to validate credentials
      // with your backend for a more secure login.
      if (email && pass) {
        state.isAdmin = true;
        closeLoginModal();
        navigate('admin');
      } else {
        alert('Por favor, preencha o email e a senha.');
      }
    });

    window.openProjectModal = function(id) {
      const project = state.projects.find(p => p.id === id);
      if (!project) return;

      const modal = document.getElementById('project-modal');
      const box = document.getElementById('project-modal-box');
      const mediaContainer = document.getElementById('project-modal-media');
      const detailsContainer = document.getElementById('project-modal-details');

      // Add custom scrollbar class to the details container
      detailsContainer.classList.add('custom-scrollbar');

      // Popula Textos
      document.getElementById('project-modal-category').textContent = project.category;
      document.getElementById('project-modal-title').textContent = project.title;
      document.getElementById('project-modal-description').textContent = project.description || '';

      // Popula Mídia com bordas arredondadas e sombras suaves
      if (project.type === 'video' && project.videoUrl) {
        mediaContainer.innerHTML = `<div class="w-full h-full p-4 md:p-8"><iframe src="${getEmbedUrl(project.videoUrl)}" class="w-full h-full border-0 rounded-2xl shadow-2xl bg-[#111]" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
      } else {
        mediaContainer.innerHTML = `<div class="w-full h-full p-4 md:p-8 flex items-center justify-center"><img src="${project.imageUrl}" alt="${project.title}" class="max-w-full max-h-full object-contain rounded-2xl shadow-2xl" /></div>`;
      }

      // Sugestão de Projeto
      const suggestionContainer = document.getElementById('project-modal-suggestion');
      const suggestionCard = document.getElementById('project-modal-suggestion-card');
      const relatedProjects = state.projects.filter(p => p.id !== id && p.category === project.category);
      const suggestedProject = relatedProjects.length > 0 ? relatedProjects[0] : state.projects.find(p => p.id !== id);

      if (suggestedProject) {
        suggestionContainer.classList.remove('hidden');
        suggestionCard.innerHTML = `
          <div class="w-24 h-24 flex-shrink-0 bg-black rounded-xl overflow-hidden flex items-center justify-center">
            <img src="${suggestedProject.imageUrl}" alt="${suggestedProject.title}" class="max-w-full max-h-full object-contain transition-transform duration-700 group-hover:scale-105" />
          </div>
          <div class="flex-1 pl-4 pr-2 overflow-hidden">
            <span class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block truncate w-full">${suggestedProject.category}</span>
            <h5 class="text-sm font-medium text-white truncate block w-full">${suggestedProject.title}</h5>
          </div>
        `;
        suggestionCard.onclick = () => {
          document.getElementById('project-modal-details').scrollTop = 0;
          openProjectModal(suggestedProject.id);
        };
      } else {
        suggestionContainer.classList.add('hidden');
      }

      // Mostra o Modal com Animação
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        box.classList.remove('scale-95');
        box.classList.add('scale-100');
      }, 10);
    }

    window.closeProjectModal = function() {
      const modal = document.getElementById('project-modal');
      const box = document.getElementById('project-modal-box');
      const mediaContainer = document.getElementById('project-modal-media');

      modal.classList.add('opacity-0');
      box.classList.remove('scale-100');
      box.classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
        mediaContainer.innerHTML = ''; // Para parar o áudio/vídeo imediatamente
      }, 300);
    }

    // Função mantida caso seja necessária num contexto futuro
    window.openVideoModal = function(url) {
      if (!url) return;
      const modal = document.getElementById('video-modal');
      const box = document.getElementById('video-modal-box');
      const iframe = document.getElementById('video-iframe');
      
      iframe.src = getEmbedUrl(url);
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        box.classList.remove('scale-95');
        box.classList.add('scale-100');
      }, 10);
    }

    window.closeVideoModal = function() {
      const modal = document.getElementById('video-modal');
      const box = document.getElementById('video-modal-box');
      const iframe = document.getElementById('video-iframe');
      
      modal.classList.add('opacity-0');
      box.classList.remove('scale-100');
      box.classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
        iframe.src = '';
      }, 300);
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      const icon = document.getElementById('mobile-menu-icon');
      
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        icon.setAttribute('data-lucide', 'x');
        lucide.createIcons();
        setTimeout(() => {
          menu.classList.remove('h-0', 'opacity-0');
          menu.classList.add('h-auto', 'opacity-100');
        }, 10);
      } else {
        closeMobileMenu();
      }
    }

    function closeMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      const icon = document.getElementById('mobile-menu-icon');
      if (!menu.classList.contains('hidden')) {
        menu.classList.add('opacity-0');
        icon.setAttribute('data-lucide', 'menu');
        lucide.createIcons();
        setTimeout(() => {
          menu.classList.add('hidden', 'h-0');
          menu.classList.remove('h-auto');
        }, 300);
      }
    }

    // Inicialização
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      fetchData();
    });

  </script>
</body>
</html>
